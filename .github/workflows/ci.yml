name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Migration drift check
        run: |
          npx drizzle-kit generate
          if ! git diff --exit-code drizzle; then
            echo "::error::Schema and migrations are out of sync. Run 'npm run db:generate' and commit the result."
            exit 1
          fi

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # next build runs without runtime env; db/index.ts falls back to a
          # placeholder connection string and never connects during build.
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          BETTER_AUTH_SECRET: ci-placeholder-secret-at-least-32-chars
          S3_BUCKET: ci-placeholder

  integration:
    name: Integration tests (Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Integration tests
        run: npm run test:integration
